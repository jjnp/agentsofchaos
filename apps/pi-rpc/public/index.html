<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pi 2x2 demo grid</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: Inter, system-ui, sans-serif;
        margin: 0;
        background: #0b1020;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 1500px;
        margin: 0 auto;
        padding: 24px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 20px;
      }
      .muted {
        color: #94a3b8;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      input, textarea, button {
        font: inherit;
      }
      input, textarea {
        width: 100%;
        box-sizing: border-box;
        background: #09111f;
        color: #e5e7eb;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px 12px;
      }
      textarea {
        min-height: 80px;
        resize: vertical;
      }
      button {
        background: #2563eb;
        color: white;
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
      }
      button.secondary {
        background: #475569;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .global {
        background: #121933;
        border: 1px solid #243056;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 20px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
      .card {
        background: #121933;
        border: 1px solid #243056;
        border-radius: 12px;
        padding: 14px;
        min-height: 0;
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        gap: 12px;
      }
      .pill {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        background: #1d4ed8;
        font-size: 12px;
      }
      .terminal {
        background: #020617;
        color: #d1fae5;
        border: 1px solid #1e293b;
        border-radius: 10px;
        padding: 12px;
        height: 320px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.45;
        margin-bottom: 12px;
      }
      .event-box {
        background: #0f172a;
        color: #cbd5e1;
        border-radius: 10px;
        padding: 10px;
        height: 140px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      @media (max-width: 1100px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .header {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div>
          <h1 style="margin: 0 0 8px">pi 2×2 grid demo</h1>
          <div id="status" class="muted">Connecting…</div>
        </div>
        <div class="toolbar">
          <span id="gridMeta" class="pill">starting grid</span>
        </div>
      </div>

      <section class="global">
        <label for="broadcastPrompt">Broadcast prompt to all 4 instances</label>
        <textarea id="broadcastPrompt" placeholder="Ask all 4 pi instances to do the same thing"></textarea>
        <div class="row">
          <button id="broadcastSend">Send to all</button>
          <button id="broadcastAbort" class="secondary">Abort all</button>
        </div>
      </section>

      <section id="grid" class="grid"></section>
    </div>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-header">
          <strong class="title"></strong>
          <span class="pill meta"></span>
        </div>
        <div class="terminal"></div>
        <label>Prompt</label>
        <textarea class="prompt" placeholder="Send a prompt to this pi instance"></textarea>
        <div class="row">
          <button class="send">Send</button>
          <button class="abort secondary">Abort</button>
        </div>
        <div style="margin-top: 12px" class="muted">Recent events</div>
        <div class="event-box"></div>
      </article>
    </template>

    <script>
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${protocol}://${location.host}`);
      const gridEl = document.getElementById('grid');
      const statusEl = document.getElementById('status');
      const gridMetaEl = document.getElementById('gridMeta');
      const broadcastPromptEl = document.getElementById('broadcastPrompt');
      const broadcastSendBtn = document.getElementById('broadcastSend');
      const broadcastAbortBtn = document.getElementById('broadcastAbort');
      const template = document.getElementById('cardTemplate');

      const sessionState = new Map();

      function createCard(index) {
        const fragment = template.content.cloneNode(true);
        const card = fragment.querySelector('.card');
        const title = fragment.querySelector('.title');
        const meta = fragment.querySelector('.meta');
        const terminal = fragment.querySelector('.terminal');
        const prompt = fragment.querySelector('.prompt');
        const send = fragment.querySelector('.send');
        const abort = fragment.querySelector('.abort');
        const eventBox = fragment.querySelector('.event-box');

        title.textContent = `Instance ${index + 1}`;
        meta.textContent = 'booting';

        send.addEventListener('click', () => {
          const message = prompt.value.trim();
          if (!message) return;
          ws.send(JSON.stringify({ type: 'prompt', target: index, message }));
        });

        abort.addEventListener('click', () => {
          ws.send(JSON.stringify({ type: 'abort', target: index }));
        });

        card.dataset.index = String(index);
        gridEl.appendChild(fragment);

        sessionState.set(index, {
          terminal,
          prompt,
          meta,
          eventBox,
          events: [],
        });
      }

      for (let i = 0; i < 4; i += 1) createCard(i);

      function appendTerminal(index, text) {
        const state = sessionState.get(index);
        if (!state || !text) return;
        state.terminal.textContent += text;
        state.terminal.scrollTop = state.terminal.scrollHeight;
      }

      function pushEvent(index, payload) {
        const state = sessionState.get(index);
        if (!state) return;
        state.events.unshift(JSON.stringify(payload, null, 2));
        state.eventBox.textContent = state.events.slice(0, 6).join('\n\n');
        state.eventBox.scrollTop = 0;
      }

      ws.addEventListener('open', () => {
        statusEl.textContent = 'Connected';
      });

      ws.addEventListener('close', () => {
        statusEl.textContent = 'Disconnected';
      });

      ws.addEventListener('message', (event) => {
        const payload = JSON.parse(event.data);

        if (payload.type === 'grid_ready') {
          gridMetaEl.textContent = `${payload.gridSize} instances • ${payload.model} • ${payload.workspace}`;
          return;
        }

        if (typeof payload.index === 'number') {
          pushEvent(payload.index, payload);
        }

        if (payload.type === 'session_ready') {
          const state = sessionState.get(payload.index);
          if (state) state.meta.textContent = `${payload.label} ready`;
          return;
        }

        if (payload.type === 'session_output') {
          appendTerminal(payload.index, payload.text);
          return;
        }

        if (payload.type === 'session_exit') {
          const state = sessionState.get(payload.index);
          if (state) state.meta.textContent = `${payload.label} exited`;
          return;
        }

        if (payload.type === 'bridge_error') {
          appendTerminal(payload.index ?? 0, `\n! bridge error ${payload.message}\n`);
        }
      });

      broadcastSendBtn.addEventListener('click', () => {
        const message = broadcastPromptEl.value.trim();
        if (!message) return;
        ws.send(JSON.stringify({ type: 'prompt_all', message }));
      });

      broadcastAbortBtn.addEventListener('click', () => {
        ws.send(JSON.stringify({ type: 'abort_all' }));
      });
    </script>
  </body>
</html>
