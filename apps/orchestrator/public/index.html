<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agentsofchaos docker grid</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div>
          <h1 style="margin: 0 0 8px">agentsofchaos</h1>
          <div id="status" class="muted">Connecting to orchestrator…</div>
        </div>
        <div>
          <span id="meta" class="pill">booting</span>
        </div>
      </div>

      <section class="toolbar">
        <div class="muted">Start empty, then create instances as needed.</div>
        <button id="newInstance">New instance</button>
      </section>

      <section id="grid" class="grid"></section>
    </div>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-header">
          <strong class="title"></strong>
          <span class="pill slot-meta"></span>
        </div>
        <div class="terminal"></div>
        <div class="lineage muted"></div>
        <label>Prompt</label>
        <textarea class="prompt" placeholder="Send a prompt to this worker"></textarea>
        <div class="row">
          <button class="send">Send</button>
          <button class="fork secondary">Fork</button>
          <button class="stop danger">Stop</button>
        </div>
        <div class="merge-row">
          <div>
            <label>Merge this instance into</label>
            <select class="mergeTarget"></select>
          </div>
          <button class="bundle secondary">Bundle</button>
          <button class="merge warn">Merge</button>
        </div>
        <div style="margin-top: 12px" class="muted">Recent events</div>
        <div class="event-box"></div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
